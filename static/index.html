<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI小说写作</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script defer src="/static/vendor/alpine.min.js"></script>
</head>
<body x-data="novelApp()" x-init="init()">
    <!-- 顶栏 -->
    <header class="topbar">
        <div class="topbar-left">
            <h1 class="app-title">AI小说写作</h1>
            <select class="project-select" x-model="currentProject" @change="selectProject(currentProject)">
                <template x-for="p in projects" :key="p.id">
                    <option :value="p" x-text="p.name"></option>
                </template>
            </select>
        </div>
        <div class="topbar-right">
            <span class="status-badge" :class="llmOnline ? 'online' : 'offline'">
                <span class="dot"></span>
                <span x-text="llmOnline ? 'LLM 在线' : 'LLM 离线'"></span>
            </span>
            <button class="btn btn-sm" @click="showNewProject = true">+ 新项目</button>
        </div>
    </header>

    <!-- 三栏布局 -->
    <main class="layout">
        <!-- 左侧：章节树 -->
        <aside class="sidebar sidebar-left">
            <div class="sidebar-header">
                <h2>章节</h2>
                <button class="btn btn-sm" x-show="currentProject" @click="showNewChapter = true">+</button>
            </div>
            <div class="sidebar-content">
                <template x-if="!currentProject">
                    <div class="empty-state">
                        <p>请先创建或选择项目</p>
                    </div>
                </template>
                <template x-if="currentProject && chapters.length === 0">
                    <div class="empty-state">
                        <p>暂无章节</p>
                        <button class="btn btn-sm" @click="showNewChapter = true">创建第一章</button>
                    </div>
                </template>
                <div class="chapter-list">
                    <template x-for="ch in chapters" :key="ch.id">
                        <div class="chapter-item"
                             :class="{'active': currentChapter?.id === ch.id}"
                             @click="selectChapter(ch)">
                            <span class="chapter-order" x-text="ch.chapter_order"></span>
                            <span class="chapter-title" x-text="ch.title"></span>
                        </div>
                    </template>
                </div>
            </div>
        </aside>

        <!-- 中间：对话区 -->
        <section class="editor-area">
            <div class="editor-header">
                <template x-if="currentChapter">
                    <div>
                        <span class="back-link" @click="backToProjectChat()">← 返回项目对话</span>
                        <h2 x-text="currentChapter.title"></h2>
                    </div>
                </template>
                <template x-if="!currentChapter && currentProject">
                    <h2 x-text="'项目对话：' + currentProject.name"></h2>
                </template>
                <template x-if="!currentProject">
                    <h2>欢迎使用 AI小说写作</h2>
                </template>
                <button class="btn btn-sm" x-show="messages.length > 0" @click="clearMessages()">清空</button>
            </div>

            <div class="editor-content chat-area">
                <!-- 错误提示 -->
                <div class="error-bar" x-show="error" x-text="error"></div>

                <!-- 欢迎页 -->
                <template x-if="messages.length === 0 && currentProject">
                    <div class="welcome">
                        <h3 x-text="currentProject.name"></h3>
                        <p x-text="currentProject.genre ? '类型：' + currentProject.genre : '开始你的创作之旅'"></p>
                        <p class="hint">在下方输入框输入消息，与 AI 开始对话</p>
                    </div>
                </template>

                <!-- 消息列表 -->
                <div class="message-list">
                    <template x-for="(msg, idx) in messages" :key="idx">
                        <div class="message" :class="msg.role">
                            <div class="message-avatar" x-text="msg.role === 'user' ? '我' : 'AI'"></div>
                            <div class="message-content">
                                <div class="message-text" x-text="msg.content"></div>
                                <span class="typing-cursor" x-show="isGenerating && idx === messages.length - 1 && msg.role === 'assistant'">▌</span>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="input-area" x-show="currentProject">
                <textarea
                    class="message-input"
                    x-model="inputMessage"
                    @keydown="onKeydown($event)"
                    :disabled="isGenerating"
                    placeholder="输入消息... (Enter 发送，Shift+Enter 换行)"
                    rows="3"></textarea>
                <div class="input-actions">
                    <button class="btn btn-stop" x-show="isGenerating" @click="stopGeneration()">停止</button>
                    <button class="btn btn-primary" x-show="!isGenerating" @click="sendMessage()" :disabled="!inputMessage.trim()">发送</button>
                </div>
            </div>
        </section>

        <!-- 右侧：设定面板 -->
        <aside class="sidebar sidebar-right">
            <div class="sidebar-header">
                <div class="tab-switcher">
                    <button class="tab" :class="{'active': activePanel === 'characters'}" @click="activePanel = 'characters'">角色</button>
                    <button class="tab" :class="{'active': activePanel === 'worldviews'}" @click="activePanel = 'worldviews'">世界观</button>
                </div>
                <button class="btn btn-sm" x-show="currentProject" @click="activePanel === 'characters' ? openCharModal() : openWvModal()">+</button>
            </div>
            <div class="sidebar-content">
                <template x-if="!currentProject">
                    <div class="empty-state"><p>请先选择项目</p></div>
                </template>

                <!-- 角色面板 -->
                <template x-if="currentProject && activePanel === 'characters'">
                    <div class="setting-list">
                        <template x-if="characters.length === 0">
                            <div class="empty-state">
                                <p>暂无角色</p>
                                <button class="btn btn-sm" @click="openCharModal()">添加角色</button>
                            </div>
                        </template>
                        <template x-for="char in characters" :key="char.id">
                            <div class="setting-card" @click="openCharModal(char)">
                                <div class="setting-card-header">
                                    <span class="setting-card-title" x-text="char.name"></span>
                                    <span class="tag" x-show="char.role" x-text="char.role"></span>
                                </div>
                                <p class="setting-card-desc" x-show="char.description" x-text="char.description"></p>
                                <div class="setting-card-actions">
                                    <button class="btn btn-sm" @click.stop="openCharModal(char)">编辑</button>
                                    <button class="btn btn-sm btn-danger" @click.stop="deleteCharacter(char)">删除</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- 世界观面板 -->
                <template x-if="currentProject && activePanel === 'worldviews'">
                    <div class="setting-list">
                        <template x-if="worldviews.length === 0">
                            <div class="empty-state">
                                <p>暂无世界观条目</p>
                                <button class="btn btn-sm" @click="openWvModal()">添加条目</button>
                            </div>
                        </template>
                        <template x-for="wv in worldviews" :key="wv.id">
                            <div class="setting-card" @click="openWvModal(wv)">
                                <div class="setting-card-header">
                                    <span class="tag" x-text="wv.category"></span>
                                    <span class="setting-card-title" x-text="wv.title"></span>
                                </div>
                                <p class="setting-card-desc" x-show="wv.content" x-text="wv.content"></p>
                                <div class="setting-card-actions">
                                    <button class="btn btn-sm" @click.stop="openWvModal(wv)">编辑</button>
                                    <button class="btn btn-sm btn-danger" @click.stop="deleteWorldview(wv)">删除</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </aside>
    </main>

    <!-- 模态框：新建项目 -->
    <div class="modal-overlay" x-show="showNewProject" @click.self="showNewProject = false" x-cloak>
        <div class="modal">
            <h3>新建项目</h3>
            <div class="form-group">
                <label>项目名称</label>
                <input type="text" x-model="newProjectName" @keydown.enter="createProject()" placeholder="如：星辰变">
            </div>
            <div class="form-group">
                <label>类型（可选）</label>
                <input type="text" x-model="newProjectGenre" placeholder="如：玄幻、都市、科幻">
            </div>
            <div class="modal-actions">
                <button class="btn" @click="showNewProject = false">取消</button>
                <button class="btn btn-primary" @click="createProject()" :disabled="!newProjectName.trim()">创建</button>
            </div>
        </div>
    </div>

    <!-- 模态框：新建章节 -->
    <div class="modal-overlay" x-show="showNewChapter" @click.self="showNewChapter = false" x-cloak>
        <div class="modal">
            <h3>新建章节</h3>
            <div class="form-group">
                <label>章节标题</label>
                <input type="text" x-model="newChapterTitle" @keydown.enter="createChapter()" placeholder="如：第一章 初入江湖">
            </div>
            <div class="modal-actions">
                <button class="btn" @click="showNewChapter = false">取消</button>
                <button class="btn btn-primary" @click="createChapter()" :disabled="!newChapterTitle.trim()">创建</button>
            </div>
        </div>
    </div>

    <!-- 模态框：角色编辑 -->
    <div class="modal-overlay" x-show="showCharModal" @click.self="showCharModal = false" x-cloak>
        <div class="modal modal-lg">
            <h3 x-text="editingChar ? '编辑角色' : '添加角色'"></h3>
            <div class="form-row">
                <div class="form-group">
                    <label>姓名 *</label>
                    <input type="text" x-model="charForm.name" placeholder="角色姓名">
                </div>
                <div class="form-group">
                    <label>身份</label>
                    <input type="text" x-model="charForm.role" placeholder="如：主角、反派、配角">
                </div>
            </div>
            <div class="form-group">
                <label>简介</label>
                <textarea x-model="charForm.description" rows="2" placeholder="一句话描述角色"></textarea>
            </div>
            <div class="form-group">
                <label>性格</label>
                <textarea x-model="charForm.personality" rows="2" placeholder="性格特点"></textarea>
            </div>
            <div class="form-group">
                <label>背景</label>
                <textarea x-model="charForm.background" rows="3" placeholder="角色背景故事"></textarea>
            </div>
            <div class="form-group">
                <label>外貌</label>
                <textarea x-model="charForm.appearance" rows="2" placeholder="外貌描写"></textarea>
            </div>
            <div class="form-group">
                <label>关键词</label>
                <input type="text" x-model="charForm.keywords" placeholder="逗号分隔，如：剑客, 冷酷, 复仇">
            </div>
            <div class="modal-actions">
                <button class="btn" @click="showCharModal = false">取消</button>
                <button class="btn btn-primary" @click="saveCharacter()" :disabled="!charForm.name.trim()">保存</button>
            </div>
        </div>
    </div>

    <!-- 模态框：世界观编辑 -->
    <div class="modal-overlay" x-show="showWvModal" @click.self="showWvModal = false" x-cloak>
        <div class="modal modal-lg">
            <h3 x-text="editingWv ? '编辑世界观' : '添加世界观'"></h3>
            <div class="form-row">
                <div class="form-group">
                    <label>分类</label>
                    <input type="text" x-model="wvForm.category" placeholder="如：地理、历史、势力、魔法体系">
                </div>
                <div class="form-group">
                    <label>标题 *</label>
                    <input type="text" x-model="wvForm.title" placeholder="条目标题">
                </div>
            </div>
            <div class="form-group">
                <label>内容 *</label>
                <textarea x-model="wvForm.content" rows="6" placeholder="详细描述"></textarea>
            </div>
            <div class="form-group">
                <label>关键词</label>
                <input type="text" x-model="wvForm.keywords" placeholder="逗号分隔">
            </div>
            <div class="modal-actions">
                <button class="btn" @click="showWvModal = false">取消</button>
                <button class="btn btn-primary" @click="saveWorldview()" :disabled="!wvForm.title.trim() || !wvForm.content.trim()">保存</button>
            </div>
        </div>
    </div>

    <script src="/static/js/sse.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
